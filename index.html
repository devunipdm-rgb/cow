<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Estimador de Peso Bovino - Realidade Aumentada</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --app-height: 100%;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #121212;
            color: #ffffff;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        #app-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100vh;
            height: fill-available;
        }

        #camera-wrapper {
            position: relative;
            flex: 1;
            background: #000;
            overflow: hidden;
            min-height: 0;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Overlay AR */
        #ar-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.5s;
        }

        .measurement-box {
            position: relative;
            border: 2px solid #10b981;
            background: rgba(16, 185, 129, 0.1);
            border-radius: 4px;
            transition: width 0.2s, height 0.2s;
        }

        /* Painel de Logs */
        #log-panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 50%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 200;
            display: none;
            flex-direction: column;
            font-family: monospace;
            font-size: 10px;
            border-bottom: 2px solid #3b82f6;
        }

        #log-content {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            color: #34d399;
        }

        /* UI Panel */
        .ui-panel {
            background: rgba(24, 24, 27, 0.98);
            backdrop-filter: blur(15px);
            padding: 16px 20px;
            border-top: 3px solid #10b981;
            z-index: 50;
            flex-shrink: 0;
        }

        input[type=range] {
            width: 100%;
            height: 12px;
            background: #27272a;
            border-radius: 10px;
            appearance: none;
            accent-color: #10b981;
        }

        .btn-main {
            background: #10b981;
            color: white;
            font-weight: 800;
            padding: 18px;
            border-radius: 15px;
            text-transform: uppercase;
            width: 100%;
            max-width: 280px;
        }

        .log-entry {
            margin-bottom: 4px;
            border-left: 2px solid #3b82f6;
            padding-left: 6px;
        }
        
        .log-error { border-left-color: #ef4444; color: #fca5a5; }
    </style>
</head>
<body>

    <div id="app-container">
        <!-- Versão e Botão Log -->
        <div class="absolute top-2 left-2 z-[150] flex gap-2">
            <button onclick="toggleLogs()" class="bg-blue-600 text-[9px] px-3 py-1 rounded-full font-bold">LOGS</button>
            <div class="bg-black/50 text-[#10b981] text-[9px] px-3 py-1 rounded-full border border-[#10b981]">v2.1.3-debug</div>
        </div>

        <!-- Painel de Logs (Oculto por padrão) -->
        <div id="log-panel">
            <div class="flex justify-between items-center bg-blue-900 px-3 py-2">
                <span class="font-bold">SISTEMA DE MONITORAMENTO</span>
                <button onclick="toggleLogs()" class="text-white font-bold">FECHAR [X]</button>
            </div>
            <div id="log-content"></div>
            <button onclick="clearLogs()" class="bg-zinc-800 py-1 text-[9px]">LIMPAR LOGS</button>
        </div>

        <div id="camera-wrapper">
            <!-- Permissão -->
            <div id="permission-prompt" class="absolute inset-0 z-[101] flex flex-col items-center justify-center bg-[#121212] p-8 text-center">
                <div class="w-16 h-16 bg-emerald-500/20 rounded-full flex items-center justify-center mb-6">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                    </svg>
                </div>
                <h1 class="text-xl font-bold mb-2">Monitoramento Ativo</h1>
                <p class="text-gray-400 text-xs mb-8 leading-relaxed">Clique para autorizar a câmera. Se houver erro, abra a aba LOGS no topo para ver o motivo técnico.</p>
                <button id="btn-request" class="btn-main">Iniciar Câmera</button>
            </div>

            <video id="camera-feed" autoplay playsinline muted></video>
            
            <div id="ar-overlay">
                <div id="measurement-box" class="measurement-box">
                    <div class="absolute -top-6 left-1/2 -translate-x-1/2 text-[10px] bg-[#10b981] text-black px-2 font-bold rounded">COMPRIMENTO</div>
                    <div class="absolute -right-12 top-1/2 -translate-y-1/2 text-[10px] bg-[#10b981] text-black px-2 font-bold rounded rotate-90">TÓRAX</div>
                </div>
            </div>
        </div>

        <div class="ui-panel">
            <div class="flex justify-between items-center mb-4">
                <div>
                    <span class="text-[10px] text-emerald-500 font-bold uppercase tracking-wider">Peso Estimado</span>
                    <div id="weight-display" class="text-4xl font-black text-white">--- <small class="text-lg text-gray-500">kg</small></div>
                </div>
                <div class="text-right">
                    <div id="arroba-display" class="text-xl font-bold text-emerald-400">-- @</div>
                    <span class="text-[9px] text-gray-500 font-bold uppercase">Rendimento</span>
                </div>
            </div>

            <div class="space-y-4">
                <div>
                    <div class="flex justify-between text-[10px] mb-1 text-gray-400 font-bold uppercase">
                        <span>Distância: <span id="dist-val" class="text-emerald-400">3.0m</span></span>
                    </div>
                    <input type="range" id="depth-slider" min="1.5" max="6.0" step="0.1" value="3.0">
                </div>

                <div class="flex gap-2">
                    <button id="btn-flip" class="flex-1 bg-zinc-800 text-white text-[10px] font-bold py-3 rounded-xl uppercase">Trocar Câmera</button>
                    <button onclick="window.location.reload()" class="w-12 bg-zinc-800 flex items-center justify-center rounded-xl">🔄</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const logContent = document.getElementById('log-content');
        const video = document.getElementById('camera-feed');
        const depthSlider = document.getElementById('depth-slider');
        const weightDisplay = document.getElementById('weight-display');
        const arrobaDisplay = document.getElementById('arroba-display');
        const measureBox = document.getElementById('measurement-box');
        const permissionPrompt = document.getElementById('permission-prompt');
        const arOverlay = document.getElementById('ar-overlay');

        let currentStream;
        let useFrontCamera = false;

        // Função de LOG customizada
        function addLog(msg, isError = false) {
            const time = new Date().toLocaleTimeString();
            const div = document.createElement('div');
            div.className = `log-entry ${isError ? 'log-error' : ''}`;
            div.innerText = `[${time}] ${msg}`;
            logContent.appendChild(div);
            logContent.scrollTop = logContent.scrollHeight;
            console.log(msg);
        }

        function toggleLogs() {
            const panel = document.getElementById('log-panel');
            panel.style.display = panel.style.display === 'flex' ? 'none' : 'flex';
        }

        function clearLogs() { logContent.innerHTML = ''; addLog("Logs limpos."); }

        // Capturar erros globais
        window.onerror = function(msg, url, line) {
            addLog(`ERRO GLOBAL: ${msg} na linha ${line}`, true);
        };

        async function startCamera() {
            addLog("Solicitando acesso à mídia...");
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
                addLog("Stream anterior parado.");
            }

            try {
                const constraints = {
                    video: { 
                        facingMode: useFrontCamera ? "user" : "environment",
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    }
                };
                
                addLog(`Configurações: ${JSON.stringify(constraints.video)}`);
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                
                addLog("Permissão de hardware OK.");
                currentStream = stream;
                video.srcObject = stream;
                
                video.onloadedmetadata = () => {
                    addLog("Metadados do vídeo carregados.");
                    video.play()
                        .then(() => {
                            addLog("Reprodução de vídeo iniciada.");
                            permissionPrompt.style.display = 'none';
                            arOverlay.style.opacity = '1';
                            updateCalculation();
                        })
                        .catch(e => addLog("Erro no Autoplay: " + e.message, true));
                };
            } catch (err) {
                addLog(`FALHA NA CÂMERA: ${err.name} - ${err.message}`, true);
                if (err.name === 'NotAllowedError') addLog("DICA: Permissão negada pelo usuário ou navegador.", true);
                if (err.name === 'NotFoundError') addLog("DICA: Nenhuma câmera encontrada no dispositivo.", true);
            }
        }

        function updateCalculation() {
            const distance = parseFloat(depthSlider.value);
            document.getElementById('dist-val').innerText = distance.toFixed(1) + "m";

            const boxWidth = (window.innerWidth * 0.75) / (distance / 3);
            const boxHeight = boxWidth / 2.1;

            measureBox.style.width = `${boxWidth}px`;
            measureBox.style.height = `${boxHeight}px`;

            const comprimentoReal = (boxWidth * distance) * 0.12; 
            const toraxReal = (boxHeight * 2.6 * distance) * 0.12;
            let pesoKg = (Math.pow(toraxReal, 2) * comprimentoReal) / 450;
            
            if (pesoKg < 40) pesoKg = 0;
            const arrobas = (pesoKg * 0.52) / 15;

            weightDisplay.innerHTML = `${Math.round(pesoKg)} <small class="text-lg text-gray-500">kg</small>`;
            arrobaDisplay.innerText = `${arrobas.toFixed(1)} @`;
        }

        document.getElementById('btn-request').addEventListener('click', startCamera);
        depthSlider.addEventListener('input', updateCalculation);
        document.getElementById('btn-flip').addEventListener('click', () => {
            useFrontCamera = !useFrontCamera;
            addLog("Invertendo câmera...");
            startCamera();
        });

        // Log inicial
        addLog("Aplicativo carregado. Aguardando interação...");
        if (location.protocol !== 'https:') addLog("AVISO: Câmera pode falhar em conexões não-HTTPS!", true);

        // Forçar ajuste de altura no carregamento
        window.addEventListener('load', () => {
            document.getElementById('app-container').style.height = window.innerHeight + 'px';
            updateCalculation();
        });
    </script>
</body>
</html>
