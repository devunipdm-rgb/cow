<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Estimador de Peso Bovino - Realidade Aumentada</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            overflow: hidden;
            height: 100vh;
        }

        #app-container {
            position: relative;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #camera-wrapper {
            position: relative;
            flex: 1;
            background: #000;
            overflow: hidden;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Overlay de Realidade Aumentada */
        #ar-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.5s;
        }

        .measurement-box {
            position: relative;
            border: 2px solid #10b981;
            background: rgba(16, 185, 129, 0.1);
            border-radius: 4px;
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.3);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: width 0.2s, height 0.2s;
        }

        .corner-node {
            position: absolute;
            width: 14px;
            height: 14px;
            background: #10b981;
            border: 2px solid white;
            border-radius: 50%;
        }

        .node-tl { top: -7px; left: -7px; }
        .node-tr { top: -7px; right: -7px; }
        .node-bl { bottom: -7px; left: -7px; }
        .node-br { bottom: -7px; right: -7px; }

        .line-label {
            position: absolute;
            background: #10b981;
            color: #064e3b;
            font-size: 10px;
            font-weight: 900;
            padding: 2px 8px;
            border-radius: 4px;
            text-transform: uppercase;
            white-space: nowrap;
        }

        /* Painel Inferior */
        .ui-panel {
            background: rgba(24, 24, 27, 0.98);
            backdrop-filter: blur(15px);
            padding: 20px;
            border-top: 3px solid #10b981;
            z-index: 50;
        }

        input[type=range] {
            width: 100%;
            height: 10px;
            background: #27272a;
            border-radius: 10px;
            appearance: none;
            accent-color: #10b981;
        }

        .version-tag {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: #10b981;
            font-size: 10px;
            padding: 4px 10px;
            border-radius: 6px;
            border: 1px solid #10b981;
            z-index: 100;
        }

        #permission-prompt {
            position: absolute;
            inset: 0;
            z-index: 101;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #121212;
            padding: 30px;
            text-align: center;
        }

        .btn-main {
            background: #10b981;
            color: white;
            font-weight: 800;
            padding: 18px 45px;
            border-radius: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: transform 0.2s;
        }
        .btn-main:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div id="app-container">
        <div class="version-tag">v2.1.1 (Cálculo Dinâmico Fix)</div>

        <div id="camera-wrapper">
            <div id="permission-prompt">
                <div class="w-16 h-16 bg-emerald-500/20 rounded-full flex items-center justify-center mb-6">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                    </svg>
                </div>
                <h1 class="text-xl font-bold mb-4">Pronto para Medir?</h1>
                <button id="btn-request" class="btn-main">Iniciar Simulador</button>
            </div>

            <video id="camera-feed" autoplay playsinline muted></video>
            
            <div id="ar-overlay">
                <div id="measurement-box" class="measurement-box">
                    <div class="corner-node node-tl"></div>
                    <div class="corner-node node-tr"></div>
                    <div class="corner-node node-bl"></div>
                    <div class="corner-node node-br"></div>
                    
                    <div class="line-label" style="top: -24px; left: 50%; transform: translateX(-50%);">Comprimento</div>
                    <div class="line-label" style="right: -45px; top: 50%; transform: translateY(-50%) rotate(90deg);">Tórax</div>
                </div>
            </div>

            <div id="tip" class="absolute top-10 left-1/2 -translate-x-1/2 bg-black/50 px-4 py-2 rounded-full text-[10px] text-white backdrop-blur opacity-0 transition-opacity">
                Ajuste a distância até o quadro cobrir o boi
            </div>
        </div>

        <div class="ui-panel">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <span class="text-[10px] text-emerald-500 font-bold uppercase tracking-wider">Peso Vivo Est.</span>
                    <div id="weight-display" class="text-5xl font-black text-white">--- <small class="text-lg text-gray-500">kg</small></div>
                </div>
                <div class="text-right">
                    <div id="arroba-display" class="text-2xl font-bold text-emerald-400">-- @</div>
                    <span class="text-[10px] text-gray-500 font-bold uppercase">Rendimento</span>
                </div>
            </div>

            <div class="space-y-6">
                <div>
                    <div class="flex justify-between text-xs mb-2 text-gray-400 font-bold uppercase">
                        <span>Distância do Animal</span>
                        <span id="dist-val" class="text-emerald-400">3.0m</span>
                    </div>
                    <input type="range" id="depth-slider" min="1.5" max="6.0" step="0.1" value="3.0">
                </div>

                <div class="flex gap-3">
                    <button id="btn-flip" class="flex-1 bg-zinc-800 text-white text-[10px] font-bold py-4 rounded-xl uppercase tracking-tighter">
                        Inverter Câmera
                    </button>
                    <button onclick="window.location.reload()" class="w-14 bg-zinc-800 flex items-center justify-center rounded-xl">
                        🔄
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('camera-feed');
        const depthSlider = document.getElementById('depth-slider');
        const distVal = document.getElementById('dist-val');
        const weightDisplay = document.getElementById('weight-display');
        const arrobaDisplay = document.getElementById('arroba-display');
        const measureBox = document.getElementById('measurement-box');
        const tip = document.getElementById('tip');
        const permissionPrompt = document.getElementById('permission-prompt');
        const btnRequest = document.getElementById('btn-request');
        const btnFlip = document.getElementById('btn-flip');
        const arOverlay = document.getElementById('ar-overlay');

        let currentStream;
        let useFrontCamera = false;

        async function startCamera() {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
            }
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: useFrontCamera ? "user" : "environment", width: 1280, height: 720 }
                });
                currentStream = stream;
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    video.play();
                    permissionPrompt.classList.add('hidden');
                    arOverlay.style.opacity = '1';
                    tip.classList.remove('opacity-0');
                    updateCalculation();
                };
            } catch (err) {
                alert("Erro ao acessar câmera. Verifique as permissões HTTPS.");
            }
        }

        function updateCalculation() {
            const distance = parseFloat(depthSlider.value);
            distVal.innerText = distance.toFixed(1) + "m";

            // Lógica de Perspectiva:
            // Quanto mais longe (distance maior), menor o quadro visual deve ser
            const visualScale = 850 / distance; 
            const boxWidth = visualScale;
            const boxHeight = visualScale / 2.1; // Proporção lateral do boi

            measureBox.style.width = `${boxWidth}px`;
            measureBox.style.height = `${boxHeight}px`;

            // FÓRMULA DE PESO DINÂMICA (Quetelet Adaptada)
            // Calculamos as dimensões "reais" em cm baseadas no tamanho do quadro e distância
            const comprimentoReal = (boxWidth * distance) * 0.12; 
            const toraxReal = (boxHeight * 2.6 * distance) * 0.12;

            // Peso = (PT² * C) / 450
            let pesoKg = (Math.pow(toraxReal, 2) * comprimentoReal) / 450;
            
            // Limites lógicos para evitar o valor fixo de erro
            if (pesoKg < 40) pesoKg = 0;
            if (pesoKg > 1200) pesoKg = 1200;

            const arrobas = (pesoKg * 0.52) / 15; // Rendimento de carcaça 52%

            weightDisplay.innerHTML = `${Math.round(pesoKg)} <small class="text-lg text-gray-500">kg</small>`;
            arrobaDisplay.innerText = `${arrobas.toFixed(1)} @`;
        }

        btnRequest.addEventListener('click', startCamera);
        depthSlider.addEventListener('input', updateCalculation);
        btnFlip.addEventListener('click', () => {
            useFrontCamera = !useFrontCamera;
            startCamera();
        });

        // Inicializa o cálculo
        updateCalculation();
    </script>
</body>
</html>
