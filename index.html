<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Estimador de Peso Bovino - Realidade Aumentada</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            color: #ffffff;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            touch-action: none;
        }

        #app-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100vh;
        }

        #camera-section {
            position: relative;
            flex: 1;
            width: 100%;
            background: #000;
            overflow: hidden;
        }

        #camera-feed {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* Quadro de Medição Interativo */
        #measurement-box {
            position: absolute;
            border: 3px solid #10b981;
            background: rgba(16, 185, 129, 0.2);
            border-radius: 4px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            z-index: 50;
            width: 200px;
            height: 100px;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: none;
            touch-action: none;
        }

        .handle-resize {
            position: absolute;
            width: 44px; /* Aumentado para facilitar o toque */
            height: 44px;
            background: #10b981;
            border: 4px solid white;
            border-radius: 50%;
            bottom: -22px;
            right: -22px;
            z-index: 60;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* UI Inferior */
        .ui-panel {
            background: #121212;
            padding: 15px 20px 25px;
            border-top: 2px solid #10b981;
            z-index: 100;
            flex-shrink: 0;
        }

        input[type=range] {
            width: 100%;
            height: 12px;
            background: #27272a;
            border-radius: 10px;
            appearance: none;
            accent-color: #10b981;
            margin-top: 8px;
        }

        .label-tag {
            position: absolute;
            background: #10b981;
            color: #000;
            font-size: 10px;
            font-weight: 900;
            padding: 2px 8px;
            border-radius: 4px;
            text-transform: uppercase;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="app-container">
        <!-- Debug e Versão -->
        <div class="absolute top-4 left-4 z-[150] flex gap-2 pointer-events-auto">
            <button onclick="toggleLogs()" class="bg-blue-600 text-[10px] px-4 py-2 rounded-full font-bold shadow-lg">LOGS</button>
            <div class="bg-black/70 text-emerald-400 text-[10px] px-4 py-2 rounded-full border border-emerald-500/50">v2.3.0-calibrada</div>
        </div>

        <div id="log-panel" class="absolute top-0 left-0 w-full h-1/3 bg-black/95 z-[200] hidden flex-col font-monospace text-[10px]">
            <div class="flex justify-between items-center bg-blue-900 p-2 text-white">
                <span>MONITORAMENTO DE CÁLCULO</span>
                <button onclick="toggleLogs()">[FECHAR]</button>
            </div>
            <div id="log-content" class="flex-1 overflow-y-auto p-2 text-emerald-300"></div>
        </div>

        <!-- Área da Câmera -->
        <main id="camera-section">
            <div id="permission-prompt" class="absolute inset-0 z-[110] flex flex-col items-center justify-center bg-zinc-900 p-8 text-center">
                <div class="w-20 h-20 bg-emerald-500/10 rounded-full flex items-center justify-center mb-6 border border-emerald-500/30">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-emerald-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                    </svg>
                </div>
                <h1 class="text-2xl font-black mb-4">PESAGEM TÁTIL</h1>
                <p class="text-zinc-400 text-sm mb-8 leading-relaxed">1. Aponte para o animal lateralmente.<br>2. Ajuste o quadro verde com os dedos.<br>3. Informe a distância no slider.</p>
                <button id="btn-start" class="w-full max-w-xs bg-emerald-500 py-5 rounded-2xl font-bold text-white shadow-lg shadow-emerald-500/20">ABRIR CÂMERA</button>
            </div>

            <video id="camera-feed" autoplay playsinline muted></video>

            <div id="measurement-box">
                <div class="label-tag" style="top: -22px; left: 0;">Comprimento</div>
                <div class="label-tag" style="right: -48px; top: 50%; transform: rotate(90deg) translateX(-50%);">Tórax</div>
                <div id="resize-handle" class="handle-resize"></div>
            </div>
        </main>

        <!-- Painel de Controle -->
        <footer class="ui-panel">
            <div class="flex justify-between items-end mb-4">
                <div>
                    <span class="text-[10px] text-emerald-500 font-bold uppercase tracking-widest">Peso Estimado</span>
                    <div id="weight-display" class="text-5xl font-black text-white leading-none">0 <small class="text-lg text-zinc-500">kg</small></div>
                </div>
                <div class="text-right">
                    <div id="arroba-display" class="text-2xl font-bold text-emerald-400">0.0 @</div>
                    <span class="text-[9px] text-zinc-500 font-bold uppercase">Arroba Líquida</span>
                </div>
            </div>

            <div class="space-y-4">
                <div>
                    <div class="flex justify-between text-[11px] text-zinc-400 font-bold uppercase">
                        <span>Sua distância do animal</span>
                        <span id="dist-text" class="text-emerald-400 font-black">3.0 m</span>
                    </div>
                    <input type="range" id="depth-slider" min="1.0" max="8.0" step="0.1" value="3.0">
                </div>

                <div class="flex gap-2">
                    <button id="btn-switch" class="flex-1 bg-zinc-800 py-4 rounded-xl text-[10px] font-bold uppercase tracking-widest">Inverter Câmera</button>
                    <button onclick="window.location.reload()" class="w-14 bg-zinc-800 rounded-xl flex items-center justify-center text-xl">🔄</button>
                </div>
            </div>
        </footer>
    </div>

    <script>
        const logContent = document.getElementById('log-content');
        const video = document.getElementById('camera-feed');
        const weightDisplay = document.getElementById('weight-display');
        const arrobaDisplay = document.getElementById('arroba-display');
        const depthSlider = document.getElementById('depth-slider');
        const distText = document.getElementById('dist-text');
        const measureBox = document.getElementById('measurement-box');
        const resizeHandle = document.getElementById('resize-handle');
        const btnStart = document.getElementById('btn-start');

        let boxPos = { x: 0, y: 0 };
        let boxSize = { w: 200, h: 100 };
        let currentStream;
        let isFront = false;

        function addLog(m, err = false) {
            const d = document.createElement('div');
            d.className = `border-b border-zinc-800 p-1 ${err ? 'text-red-400' : ''}`;
            d.innerText = `> ${m}`;
            logContent.appendChild(d);
            logContent.scrollTop = logContent.scrollHeight;
        }

        function toggleLogs() {
            const p = document.getElementById('log-panel');
            p.classList.toggle('hidden');
            p.classList.toggle('flex');
        }

        async function initCamera() {
            addLog("Solicitando acesso...");
            if (currentStream) currentStream.getTracks().forEach(t => t.stop());

            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: isFront ? "user" : "environment", width: {ideal: 1280}, height: {ideal: 720} }
                });
                video.srcObject = stream;
                currentStream = stream;
                
                video.onloadedmetadata = () => {
                    video.play();
                    document.getElementById('permission-prompt').style.display = 'none';
                    measureBox.style.display = 'block';
                    
                    // Centralizar o quadro no início
                    boxPos.x = window.innerWidth / 2;
                    boxPos.y = (window.innerHeight / 2) - 100;
                    
                    updateBoxUI();
                    calculate();
                };
            } catch (e) {
                addLog("ERRO DE CÂMERA: " + e.message, true);
            }
        }

        // --- INTERAÇÃO TÁTIL ---
        let dragging = false;
        let resizing = false;
        let startX, startY, startW, startH;

        measureBox.addEventListener('touchstart', (e) => {
            if (e.target === resizeHandle) return;
            dragging = true;
            startX = e.touches[0].clientX - boxPos.x;
            startY = e.touches[0].clientY - boxPos.y;
        });

        resizeHandle.addEventListener('touchstart', (e) => {
            e.stopPropagation();
            resizing = true;
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
            startW = boxSize.w;
            startH = boxSize.h;
        });

        window.addEventListener('touchmove', (e) => {
            if (dragging) {
                boxPos.x = e.touches[0].clientX - startX;
                boxPos.y = e.touches[0].clientY - startY;
            }
            if (resizing) {
                // O quadro muda de tamanho APENAS pelo dedo
                boxSize.w = Math.max(50, startW + (e.touches[0].clientX - startX));
                boxSize.h = Math.max(30, startH + (e.touches[0].clientY - startY));
            }
            if (dragging || resizing) {
                updateBoxUI();
                calculate();
            }
        });

        window.addEventListener('touchend', () => { dragging = resizing = false; });

        function updateBoxUI() {
            measureBox.style.left = boxPos.x + 'px';
            measureBox.style.top = boxPos.y + 'px';
            measureBox.style.width = boxSize.w + 'px';
            measureBox.style.height = boxSize.h + 'px';
        }

        // --- MATEMÁTICA DO PESO ---
        function calculate() {
            const dist = parseFloat(depthSlider.value);
            distText.innerText = dist.toFixed(1) + " m";

            // LÓGICA: 
            // 1. Quanto maior a distância (dist), maior é o animal para um mesmo tamanho de quadro na tela.
            // 2. O 'pixel_size' converte o tamanho da tela para cm reais baseado na profundidade.
            const pixel_size = (dist * 0.135); 

            const comprimentoReal = boxSize.w * pixel_size;
            const perimetroToraxReal = (boxSize.h * 2.85) * pixel_size; 

            // Fórmula Quetelet adaptada (PT² * C / 300)
            let pesoKg = (Math.pow(perimetroToraxReal, 2) * comprimentoReal) / 300;
            
            // Limites de segurança
            if (pesoKg < 0) pesoKg = 0;
            if (pesoKg > 1500) pesoKg = 1500;

            const arrobas = (pesoKg * 0.52) / 15;

            weightDisplay.innerHTML = `${Math.round(pesoKg)} <small class="text-lg text-zinc-500">kg</small>`;
            arrobaDisplay.innerText = arrobas.toFixed(1) + " @";
        }

        btnStart.onclick = initCamera;
        // Agora o slider só chama o cálculo, ele não mexe no CSS do quadro
        depthSlider.oninput = calculate;
        document.getElementById('btn-switch').onclick = () => { isFront = !isFront; initCamera(); };

        window.onload = () => {
            document.getElementById('app-container').style.height = window.innerHeight + 'px';
            addLog("Sistema iniciado e aguardando toque.");
        };
    </script>
</body>
</html>
